<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STANDUP ARCADE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #08100a;
      --panel:      #0d160f;
      --green:      #5aaa5a;
      --green-dim:  #3a6040;
      --green-dark: #1e361e;
      --yellow:     #b89640;
      --red:        #a84040;
      --red-dark:   #5a2828;
      --cyan:       #4a8898;
      --blue:       #4a70b8;
      --blue-dark:  #2a4070;
      --magenta:    #886688;
      --white:      #c8d4c8;
      --grey:       #445044;
      --font:       'Press Start 2P', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: #020a03;
      color: var(--green);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 40px 60px;
    }


    /* ── CRT vignette — darken edges like a real tube ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 55%,
        rgba(0,0,0,0.72) 100%
      );
      pointer-events: none;
      z-index: 9998;
    }


    /* ── Pixel progress bar ── */
    #progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 12px;
      background: #111;
      border-bottom: 2px solid var(--green-dim);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #progress-bar-wrap.visible { opacity: 1; }
    #progress-bar {
      height: 100%;
      width: 0%;
      /* pixel block fill */
      background: repeating-linear-gradient(
        90deg,
        var(--green) 0px, var(--green) 14px,
        var(--bg)    14px, var(--bg)   17px
      );
      transition: width 0.35s steps(20, end);
      box-shadow: none;
    }

    /* ── Header ── */
    .app-header {
      text-align: center;
      margin-bottom: 32px;
      line-height: 1;
    }
    .header-deco {
      font-size: 42px;
      letter-spacing: 8px;
      margin-bottom: 10px;
      animation: flicker 6s infinite;
    }
    .app-title {
      font-size: 53px;
      color: var(--yellow);
      letter-spacing: 6px;
      margin-bottom: 6px;
    }
    .app-sub {
      font-size: 19px;
      color: var(--green-dim);
      letter-spacing: 3px;
    }
    .hiscore {
      font-size: 19px;
      color: var(--cyan);
      margin-top: 14px;
      letter-spacing: 2px;
    }
    .hiscore span {
      color: var(--white);
    }

    /* ── Panels ── */
    .card-stack {
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      /* CRT screen shape */
      border-radius: 18px;
      overflow: hidden;
      /* phosphor green glow + inner tube shadow */
      box-shadow:
        0 0 0 3px #1a2e1a,
        0 0 28px 4px rgba(74,246,38,0.12),
        0 0 80px 10px rgba(74,246,38,0.06),
        inset 0 0 80px rgba(0,0,0,0.55);
      /* subtle barrel warp via perspective tilt */
      transform: perspective(900px) rotateX(0.8deg);
      transform-origin: center top;
    }

    .panel {
      background: var(--panel);
      border: 3px solid var(--green);
      position: relative;
      box-shadow: none;
    }

    /* corner pixel decoration */
    .panel::before {
      content: '█ █';
      position: absolute;
      top: -12px; left: 4px;
      font-size: 19px;
      color: var(--green);
      letter-spacing: 2px;
      background: var(--bg);
      padding: 0 4px;
      line-height: 1;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 2px solid var(--green-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-size: 23px;
      color: var(--green);
      letter-spacing: 2px;
    }
    .panel-title::before { content: '▶ '; }
    .panel-badge {
      font-size: 23px;
      color: var(--yellow);
    }

    .panel-body { padding: 24px; }

    /* ── Input ── */
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .input-row .btn { width: 100%; }
    .px-input {
      flex: 1;
      background: #000;
      border: 2px solid var(--green-dim);
      color: var(--green);
      font-family: var(--font);
      font-size: 19px;
      padding: 13px 12px;
      outline: none;
      caret-color: var(--green);
      transition: border-color 0.15s;
    }
    .px-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(57,255,20,0.3);
    }
    .px-input::placeholder { color: #2a4a20; }

    /* ── Buttons ── */
    .btn {
      font-family: var(--font);
      font-size: 19px;
      border: none;
      cursor: pointer;
      padding: 13px 18px;
      letter-spacing: 1px;
      transition: transform 0.07s, box-shadow 0.07s;
      white-space: nowrap;
      position: relative;
    }
    .btn:active { transform: translateY(4px); box-shadow: none !important; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .btn-green {
      background: var(--green);
      color: #0d160f;
      box-shadow: 0 4px 0 var(--green-dark);
    }
    .btn-green:not(:disabled):hover { background: #6abf6a; }

    .btn-grey {
      background: #222;
      color: var(--green);
      border: 2px solid var(--green-dim);
      box-shadow: 0 4px 0 #111;
    }
    .btn-grey:not(:disabled):hover { border-color: var(--green); }

    .btn-yellow {
      background: var(--yellow);
      color: #0d160f;
      box-shadow: 0 4px 0 #5a4818;
    }
    .btn-yellow:not(:disabled):hover { background: #c8a850; }

    .btn-red {
      background: var(--red);
      color: #fff;
      box-shadow: 0 4px 0 var(--red-dark);
    }
    .btn-red:not(:disabled):hover { background: #ff4466; }

    .btn-blue {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 0 var(--blue-dark);
    }
    .btn-blue:not(:disabled):hover { background: #6a90d8; }

    /* ── Status line ── */

    /* ── Action row ── */
    .action-row {
      display: flex;
      gap: 8px;
    }
    .action-row .btn { flex: 1; }

    /* ── Team panel ── */
    .empty-state {
      font-size: 19px;
      color: var(--green-dim);
      text-align: center;
      padding: 28px 8px;
      line-height: 2.5;
    }
    .empty-sub {
      font-size: 18px;
      color: #2a4a20;
      display: block;
      margin-top: 8px;
    }
    .blink {
      animation: blink 1.1s step-start infinite;
    }

    /* Current speaker block */
    .speaker-block {
      border: 3px solid var(--yellow);
      background: #0a0800;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: none;
      animation: pop-in 0.15s steps(3, end);
    }
    .speaker-eyebrow {
      font-size: 18px;
      color: var(--yellow);
      letter-spacing: 2px;
      margin-bottom: 10px;
      animation: blink 1s step-start infinite;
    }
    .speaker-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .speaker-sprite {
      width: 46px;
      height: 46px;
      background: var(--green-dim);
      color: var(--white);
      font-size: 23px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      /* pixel checkerboard corner cuts */
      clip-path: polygon(4px 0%, calc(100% - 4px) 0%, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px);
    }
    .speaker-name {
      font-size: 23px;
      color: var(--white);
      letter-spacing: 1px;
      text-shadow: none;
      word-break: break-all;
    }

    /* Queue sections */
    .q-section { margin-bottom: 14px; }
    .q-label {
      font-size: 18px;
      color: var(--grey);
      letter-spacing: 3px;
      padding: 6px 0 6px 4px;
      border-bottom: 1px solid #222;
      margin-bottom: 6px;
    }
    .q-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
      font-size: 19px;
      color: var(--green);
      letter-spacing: 1px;
    }
    .q-row::before { content: '░ '; color: var(--green-dim); }
    .q-row.cleared {
      color: #2a4a20;
      text-decoration: line-through;
    }
    .q-row.cleared::before { content: '✓ '; color: var(--green-dim); }

    /* Idle preview */
    .preview-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
      font-size: 19px;
      color: var(--green);
      letter-spacing: 1px;
      animation: fade-in 0.1s steps(2, end) both;
    }
    .preview-row::before { content: '░ '; color: var(--green-dim); }
    .preview-rank {
      margin-left: auto;
      color: var(--green-dim);
      font-size: 18px;
    }

    /* Finish screen */
    .finish-block {
      text-align: center;
      padding: 16px 8px 20px;
      animation: pop-in 0.2s steps(4, end);
    }
    .finish-title {
      font-size: 24px;
      color: var(--yellow);
      text-shadow: 0 0 12px var(--yellow);
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    .finish-sub {
      font-size: 18px;
      color: var(--green-dim);
      letter-spacing: 2px;
    }
    .finish-stars {
      font-size: 53px;
      letter-spacing: 6px;
      margin-bottom: 12px;
    }

    /* ── Options panel ── */
    .options-toggle {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .options-toggle:hover { background: #0a1208; }
    .options-toggle-title {
      font-size: 23px;
      color: var(--green);
      letter-spacing: 2px;
    }
    .options-toggle-title::before { content: '▶ '; }
    .chevron {
      font-size: 19px;
      color: var(--green-dim);
      transition: transform 0.15s;
    }
    .chevron.open { transform: rotate(180deg); }

    .options-divider { border-top: 2px solid var(--green-dim); }

    .options-body {
      padding: 14px 16px 16px;
      display: none;
    }
    .options-body.open { display: block; }

    .opt-label {
      font-size: 18px;
      color: var(--green-dim);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .member-list { margin-bottom: 12px; }
    .member-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      border-bottom: 1px solid #111;
      font-size: 19px;
      color: var(--green);
      letter-spacing: 1px;
    }
    .member-row::before { content: '░ '; color: var(--green-dim); }
    .member-row-name { flex: 1; }
    .remove-btn {
      background: none;
      border: 1px solid var(--red-dark);
      color: var(--red-dark);
      font-family: var(--font);
      font-size: 19px;
      cursor: pointer;
      padding: 3px 6px;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .remove-btn:hover { background: var(--red-dark); color: var(--red); }
    #error-msg {
      font-size: 18px;
      color: var(--red);
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    #error-msg::before { content: '! '; }

    .add-row { display: flex; flex-direction: column; gap: 6px; }
    .add-row .btn { width: 100%; }

    /* ── Keyframes ── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes flicker {
      0%,  95%, 100% { opacity: 1; }
      96%            { opacity: 0.4; }
      97%            { opacity: 1; }
      98%            { opacity: 0.6; }
      99%            { opacity: 1; }
    }
    @keyframes pop-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes march {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .marching { animation: march 0.8s steps(2) infinite; }
  </style>
</head>
<body>

<!-- Pixel progress bar -->
<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<!-- Header -->
<header class="app-header">
  <div class="header-deco">👾 &nbsp; 👾 &nbsp; 👾</div>
  <div class="app-title">STANDUP</div>
  <div class="app-sub">ARCADE &nbsp; V1.0</div>
  <div class="hiscore">HI-SCORE &nbsp; <span id="hiscore-val">00000</span></div>
</header>

<div class="card-stack">

  <!-- ── Mission Control panel ── -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">MISSION CONTROL</span>
    </div>
    <div class="panel-body">
      <div class="input-row" id="url-row">
        <input id="meeting-input" class="px-input"
               placeholder="meet.google.com/abc-def-ghi"
               oninput="updateLoadBtn()"
               onkeydown="if(event.key==='Enter') handleMainBtn()" />
        <button class="btn btn-grey" id="load-btn" onclick="handleMainBtn()" disabled>SCAN</button>
      </div>
      <div id="error-msg" style="display:none"></div>
      <div id="speaker-display" style="display:none"></div>
      <div class="action-row">
        <button class="btn btn-yellow" id="next-btn"  onclick="nextSpeaker()"  style="display:none">NEXT&nbsp;►</button>
        <button class="btn btn-blue"   id="skip-btn"  onclick="skipSpeaker()"  style="display:none">SKIP FOR NOW</button>
        <button class="btn btn-red"    id="end-btn"   onclick="endStandup()"   style="display:none">QUIT</button>
      </div>
    </div>
  </div>

  <!-- ── Players panel ── -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">PLAYERS</span>
      <span class="panel-badge" id="team-badge"></span>
    </div>
    <div class="panel-body">
      <div id="team-content">
        <div class="empty-state">
          <div class="blink">-- NO PLAYERS FOUND --</div>
          <span class="empty-sub">INSERT COIN TO CONTINUE</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Options panel ── -->
  <div class="panel">
    <div class="options-toggle" onclick="toggleSettings()">
      <span class="options-toggle-title">OPTIONS</span>
      <span class="chevron" id="chevron">▼</span>
    </div>
    <div class="options-divider"></div>
    <div class="options-body" id="settings-body">
      <div class="opt-label">ADD PLAYERS</div>
      <div class="member-list" id="member-list"></div>
      <div class="add-row">
        <input id="add-input" class="px-input"
               placeholder="PLAYER NAME..."
               onkeydown="if(event.key==='Enter') addMember()" />
        <button class="btn btn-green" onclick="addMember()">+&nbsp;ADD</button>
      </div>
    </div>
  </div>

</div><!-- card-stack -->

<!-- ── DOM Templates ── -->
<template id="tpl-member-row">
  <div class="member-row">
    <span class="member-row-name"></span>
    <button type="button" class="remove-btn">DEL</button>
  </div>
</template>

<template id="tpl-preview-row">
  <div class="preview-row">
    <span class="preview-rank"></span>
  </div>
</template>

<template id="tpl-empty">
  <div class="empty-state">
    <div class="blink">-- NO PLAYERS FOUND --</div>
    <span class="empty-sub">INSERT COIN TO CONTINUE</span>
  </div>
</template>

<template id="tpl-speaker">
  <div class="speaker-block">
    <div class="speaker-eyebrow">▶ NOW SPEAKING</div>
    <div class="speaker-row">
      <div class="speaker-sprite marching"></div>
      <div class="speaker-name"></div>
    </div>
  </div>
</template>

<template id="tpl-finish">
  <div class="finish-block">
    <div class="finish-stars blink">★ ★ ★</div>
    <div class="finish-title">STAGE CLEAR!</div>
    <div class="finish-sub"></div>
  </div>
</template>

<template id="tpl-q-row">
  <div class="q-row"></div>
</template>

<template id="tpl-q-section">
  <div class="q-section"></div>
</template>

<template id="tpl-q-label">
  <div class="q-label"></div>
</template>

<script>
  /* ── State ── */
  let team      = [];
  let remaining = [];
  let done      = [];
  let justSkipped = false;
  let current   = null;
  let sessionCount = 0;

  const $ = id => document.getElementById(id);

  /* ── Persistence ── */
  function persist()  { /* team is session-only; no localStorage */ }
  function restore() {
    // team always starts empty — populated by SCAN or manual add
    sessionCount = parseInt(localStorage.getItem('standup-sessions') || '0', 10);
    updateHiScore();
    renderMemberList();
    renderIdleTeam();
    updateLoadBtn();
  }

  function updateHiScore() {
    $('hiscore-val').textContent = String(sessionCount * 1000).padStart(5, '0');
  }

  /* ── Meet API ── */
  async function loadAttendees() {
    const val = $('meeting-input').value.trim();
    if (!val) { return; }

    clearStatus();
    const btn = $('load-btn');
    btn.disabled = true; btn.textContent = 'THINKING...';

    try {
      const res  = await fetch('/api/attendees?meeting=' + encodeURIComponent(val));
      const data = await res.json();
      if (data.error) {
        setStatus(data.error);
      } else {
        team = (data.attendees || []);
        endSession();
        renderMemberList();
        renderIdleTeam();
        if (team.length) {
          startStandup();
        } else {
          updateLoadBtn();
        }
      }
    } catch(e) {
      setStatus(e.message);
      updateLoadBtn();
    }
  }

  /* ── Team management ── */
  function addMember() {
    const inp = $('add-input');
    const name = inp.value.trim();
    if (!name || team.includes(name)) { inp.value = ''; return; }
    team.push(name);
    inp.value = '';
    persist();
    renderMemberList();
    if (current === null) renderIdleTeam();
    updateLoadBtn();
  }

  function removeMember(idx) {
    team.splice(idx, 1);
    renderMemberList();
    if (current === null) renderIdleTeam();
    updateLoadBtn();
  }


  /* ── Standup session ── */
  function startStandup() {
    if (!team.length) return;
    done        = [];
    justSkipped = false;
    remaining   = shuffle([...team]);
    current     = remaining.shift();
    showSessionButtons(true);
    renderSession();
    setProgressBar();
  }

  function nextSpeaker() {
    justSkipped = false;
    done.push(current);
    if (!remaining.length) { finishStandup(); return; }
    current = remaining.shift();
    renderSession();
    setProgressBar();
    $('next-btn').textContent = remaining.length === 0 ? 'FINISH' : 'NEXT ►';
  }

  function skipSpeaker() {
    justSkipped = true;
    remaining.push(current);
    current = remaining.shift();
    renderSession();
    setProgressBar();
  }

  function finishStandup() {
    done.push(current);
    const all = done.slice();
    sessionCount++;
    localStorage.setItem('standup-sessions', sessionCount);
    updateHiScore();
    endSession();
    renderFinished(all);
    updateLoadBtn();
  }

  function endStandup() {
    endSession();
    renderIdleTeam();
  }

  function endSession() {
    remaining = []; done = []; justSkipped = false; current = null;
    showSessionButtons(false);
    hideProgressBar();
    const sp = $('speaker-display');
    sp.style.display = 'none';
    sp.replaceChildren();
  }

  /* ── Template helper ── */
  function cloneTpl(id) {
    return document.getElementById('tpl-' + id).content.cloneNode(true).firstElementChild;
  }

  /* ── Rendering ── */
  function renderMemberList() {
    const nodes = team.map(function(name, idx) {
      const row = cloneTpl('member-row');
      row.querySelector('.member-row-name').textContent = name;
      row.querySelector('.remove-btn').onclick = (function(i) {
        return function(e) { e.stopPropagation(); removeMember(i); };
      })(idx);
      return row;
    });
    $('member-list').replaceChildren(...nodes);
  }

  function renderIdleTeam() {
    const content = $('team-content');
    const badge   = $('team-badge');

    if (!team.length) {
      badge.textContent = '';
      content.replaceChildren(cloneTpl('empty'));
      return;
    }

    badge.textContent = team.length + 'P';
    const nodes = shuffle([...team]).map((name, i) => {
      const row  = cloneTpl('preview-row');
      row.style.animationDelay = (i * 30) + 'ms';
      const rank = row.querySelector('.preview-rank');
      rank.textContent = '#' + (i + 1);
      row.insertBefore(document.createTextNode(name), rank);
      return row;
    });
    content.replaceChildren(...nodes);
  }

  function renderSession() {
    const badge = $('team-badge');
    badge.textContent = (done.length + 1) + '/' + team.length;
    $('skip-btn').disabled = remaining.length === 0 || justSkipped;

    // Current speaker — above buttons in mission control
    const block = cloneTpl('speaker');
    block.querySelector('.speaker-sprite').textContent = initials(current);
    block.querySelector('.speaker-name').textContent   = current;
    const speaker = $('speaker-display');
    speaker.style.display = '';
    speaker.replaceChildren(block);

    const sections = [];

    // Remaining queue (no label)
    if (remaining.length) {
      const sec = cloneTpl('q-section');
      remaining.forEach(name => {
        const row = cloneTpl('q-row');
        row.textContent = name;
        sec.appendChild(row);
      });
      sections.push(sec);
    }

    // Done list
    if (done.length) {
      const sec = cloneTpl('q-section');
      const lbl = cloneTpl('q-label');
      lbl.textContent = 'CLEARED';
      sec.appendChild(lbl);
      done.forEach(name => {
        const row = cloneTpl('q-row');
        row.textContent = name;
        row.classList.add('cleared');
        sec.appendChild(row);
      });
      sections.push(sec);
    }

    $('team-content').replaceChildren(...sections);
  }

  function renderFinished(all) {
    $('team-badge').textContent = all.length + 'P';

    const block = cloneTpl('finish');
    block.querySelector('.finish-sub').textContent =
      all.length + ' PLAYER' + (all.length > 1 ? 'S' : '') +
      ' SPOKE  ·  +' + (all.length * 100) + ' PTS';

    const sec = cloneTpl('q-section');
    const lbl = cloneTpl('q-label');
    lbl.textContent = 'ROLL CALL';
    sec.appendChild(lbl);
    all.forEach(name => {
      const row = cloneTpl('q-row');
      row.textContent = name;
      row.classList.add('cleared');
      sec.appendChild(row);
    });

    $('team-content').replaceChildren(block, sec);
  }

  /* ── Progress bar ── */
  function setProgressBar() {
    $('progress-bar-wrap').classList.add('visible');
    $('progress-bar').style.width = ((done.length + 1) / team.length * 100) + '%';
  }
  function hideProgressBar() {
    $('progress-bar-wrap').classList.remove('visible');
    $('progress-bar').style.width = '0%';
  }

  /* ── UI helpers ── */
  function showSessionButtons(active) {
    $('url-row').style.display   = active ? 'none' : '';
    $('next-btn').style.display  = active ? '' : 'none';
    $('skip-btn').style.display  = active ? '' : 'none';
    $('end-btn').style.display   = active ? '' : 'none';
    $('next-btn').textContent = 'NEXT ►';
  }

  function updateLoadBtn() {
    const btn    = $('load-btn');
    const hasUrl = $('meeting-input').value.trim().length > 0;
    if (hasUrl) {
      btn.textContent = 'START';
      btn.className   = 'btn btn-green';
      btn.disabled    = false;
    } else {
      btn.textContent = 'SCAN';
      btn.className   = 'btn btn-grey';
      btn.disabled    = team.length === 0;
    }
  }

  function handleMainBtn() {
    const url = $('meeting-input').value.trim();
    if (url) {
      loadAttendees();
    } else if (team.length) {
      startStandup();
    }
  }


  /* ── Error display ── */
  let _errTimer = null;
  function setStatus(msg) {
    const el = $('error-msg');
    el.textContent = msg.toUpperCase();
    el.style.display = '';
    if (_errTimer) clearTimeout(_errTimer);
    _errTimer = setTimeout(() => { el.style.display = 'none'; _errTimer = null; }, 4000);
  }
  function clearStatus() {
    if (_errTimer) { clearTimeout(_errTimer); _errTimer = null; }
    $('error-msg').style.display = 'none';
  }

  function toggleSettings() {
    $('settings-body').classList.toggle('open');
    $('chevron').classList.toggle('open');
  }

  /* ── Utilities ── */
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initials(name) {
    return name.split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || '?';
  }


  /* ── Boot ── */
  restore();

  // Pre-fill meeting URL from page query args and auto-load if present.
  const _urlParams = new URLSearchParams(window.location.search);
  const _meetParam = _urlParams.get('meeting');
  if (_meetParam) {
    $('meeting-input').value = _meetParam;
    updateLoadBtn();
    loadAttendees();
  }
</script>
