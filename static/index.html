<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STANDUP ARCADE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #08100a;
      --panel:      #0d160f;
      --green:      #5aaa5a;
      --green-dim:  #3a6040;
      --green-dark: #1e361e;
      --yellow:     #b89640;
      --red:        #a84040;
      --red-dark:   #5a2828;
      --cyan:       #4a8898;
      --magenta:    #886688;
      --white:      #c8d4c8;
      --grey:       #445044;
      --font:       'Press Start 2P', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--green);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 60px;
      /* CRT curvature illusion via radial vignette */
      background-image: radial-gradient(ellipse at center, #0d180e 0%, #06100a 100%);
    }

    /* ── Scanlines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Pixel progress bar ── */
    #progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 12px;
      background: #111;
      border-bottom: 2px solid var(--green-dim);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #progress-bar-wrap.visible { opacity: 1; }
    #progress-bar {
      height: 100%;
      width: 0%;
      /* pixel block fill */
      background: repeating-linear-gradient(
        90deg,
        var(--green) 0px, var(--green) 14px,
        var(--bg)    14px, var(--bg)   17px
      );
      transition: width 0.35s steps(20, end);
      box-shadow: none;
    }

    /* ── Header ── */
    .app-header {
      text-align: center;
      margin-bottom: 32px;
      line-height: 1;
    }
    .header-deco {
      font-size: 42px;
      letter-spacing: 8px;
      margin-bottom: 10px;
      animation: flicker 6s infinite;
    }
    .app-title {
      font-size: 53px;
      color: var(--yellow);
      letter-spacing: 6px;
      margin-bottom: 6px;
    }
    .app-sub {
      font-size: 21px;
      color: var(--green-dim);
      letter-spacing: 3px;
    }
    .hiscore {
      font-size: 21px;
      color: var(--cyan);
      margin-top: 14px;
      letter-spacing: 2px;
    }
    .hiscore span {
      color: var(--white);
    }

    /* ── Panels ── */
    .card-stack {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 3px solid var(--green);
      position: relative;
      box-shadow: none;
    }

    /* corner pixel decoration */
    .panel::before {
      content: '█ █';
      position: absolute;
      top: -12px; left: 4px;
      font-size: 21px;
      color: var(--green);
      letter-spacing: 2px;
      background: var(--bg);
      padding: 0 4px;
      line-height: 1;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 2px solid var(--green-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-size: 25px;
      color: var(--green);
      letter-spacing: 2px;
    }
    .panel-title::before { content: '▶ '; }
    .panel-badge {
      font-size: 25px;
      color: var(--yellow);
    }

    .panel-body { padding: 16px; }

    /* ── Input ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .px-input {
      flex: 1;
      background: #000;
      border: 2px solid var(--green-dim);
      color: var(--green);
      font-family: var(--font);
      font-size: 21px;
      padding: 13px 12px;
      outline: none;
      caret-color: var(--green);
      transition: border-color 0.15s;
    }
    .px-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(57,255,20,0.3);
    }
    .px-input::placeholder { color: #2a4a20; }

    /* ── Buttons ── */
    .btn {
      font-family: var(--font);
      font-size: 21px;
      border: none;
      cursor: pointer;
      padding: 13px 18px;
      letter-spacing: 1px;
      transition: transform 0.07s, box-shadow 0.07s;
      white-space: nowrap;
      position: relative;
    }
    .btn:active { transform: translateY(4px); box-shadow: none !important; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .btn-green {
      background: var(--green);
      color: #0d160f;
      box-shadow: 0 4px 0 var(--green-dark);
    }
    .btn-green:not(:disabled):hover { background: #6abf6a; }

    .btn-grey {
      background: #222;
      color: var(--green);
      border: 2px solid var(--green-dim);
      box-shadow: 0 4px 0 #111;
    }
    .btn-grey:not(:disabled):hover { border-color: var(--green); }

    .btn-yellow {
      background: var(--yellow);
      color: #0d160f;
      box-shadow: 0 4px 0 #5a4818;
    }
    .btn-yellow:not(:disabled):hover { background: #c8a850; }

    .btn-red {
      background: var(--red);
      color: #fff;
      box-shadow: 0 4px 0 var(--red-dark);
    }
    .btn-red:not(:disabled):hover { background: #ff4466; }

    /* ── Status line ── */
    .status-line {
      font-size: 20px;
      color: var(--green-dim);
      min-height: 16px;
      margin-bottom: 14px;
      letter-spacing: 1px;
      line-height: 1.8;
    }
    .status-line::before { content: '> '; }
    .status-line.error { color: var(--red); }

    /* ── Action row ── */
    .action-row {
      display: flex;
      gap: 8px;
    }
    .action-row .btn { flex: 1; }

    /* ── Team panel ── */
    .empty-state {
      font-size: 21px;
      color: var(--green-dim);
      text-align: center;
      padding: 28px 8px;
      line-height: 2.5;
    }
    .empty-sub {
      font-size: 20px;
      color: #2a4a20;
      display: block;
      margin-top: 8px;
    }
    .blink {
      animation: blink 1.1s step-start infinite;
    }

    /* Current speaker block */
    .speaker-block {
      border: 3px solid var(--yellow);
      background: #0a0800;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: none;
      animation: pop-in 0.15s steps(3, end);
    }
    .speaker-eyebrow {
      font-size: 20px;
      color: var(--yellow);
      letter-spacing: 2px;
      margin-bottom: 10px;
      animation: blink 1s step-start infinite;
    }
    .speaker-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .speaker-sprite {
      width: 46px;
      height: 46px;
      background: var(--green-dim);
      color: var(--white);
      font-size: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      /* pixel checkerboard corner cuts */
      clip-path: polygon(4px 0%, calc(100% - 4px) 0%, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px);
    }
    .speaker-name {
      font-size: 25px;
      color: var(--white);
      letter-spacing: 1px;
      text-shadow: none;
      word-break: break-all;
    }

    /* Queue sections */
    .q-section { margin-bottom: 14px; }
    .q-label {
      font-size: 20px;
      color: var(--grey);
      letter-spacing: 3px;
      padding: 6px 0 6px 4px;
      border-bottom: 1px solid #222;
      margin-bottom: 6px;
    }
    .q-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
      font-size: 21px;
      color: var(--green);
      letter-spacing: 1px;
    }
    .q-row::before { content: '░ '; color: var(--green-dim); }
    .q-row.cleared {
      color: #2a4a20;
      text-decoration: line-through;
    }
    .q-row.cleared::before { content: '✓ '; color: var(--green-dim); }

    /* Idle preview */
    .preview-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
      font-size: 21px;
      color: var(--green);
      letter-spacing: 1px;
      animation: fade-in 0.1s steps(2, end) both;
    }
    .preview-row::before { content: '░ '; color: var(--green-dim); }
    .preview-rank {
      margin-left: auto;
      color: var(--green-dim);
      font-size: 20px;
    }

    /* Finish screen */
    .finish-block {
      text-align: center;
      padding: 16px 8px 20px;
      animation: pop-in 0.2s steps(4, end);
    }
    .finish-title {
      font-size: 27px;
      color: var(--yellow);
      text-shadow: 0 0 12px var(--yellow);
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    .finish-sub {
      font-size: 20px;
      color: var(--green-dim);
      letter-spacing: 2px;
    }
    .finish-stars {
      font-size: 53px;
      letter-spacing: 6px;
      margin-bottom: 12px;
    }

    /* ── Options panel ── */
    .options-toggle {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .options-toggle:hover { background: #0a1208; }
    .options-toggle-title {
      font-size: 25px;
      color: var(--green);
      letter-spacing: 2px;
    }
    .options-toggle-title::before { content: '▶ '; }
    .chevron {
      font-size: 21px;
      color: var(--green-dim);
      transition: transform 0.15s;
    }
    .chevron.open { transform: rotate(180deg); }

    .options-divider { border-top: 2px solid var(--green-dim); }

    .options-body {
      padding: 14px 16px 16px;
      display: none;
    }
    .options-body.open { display: block; }

    .opt-label {
      font-size: 20px;
      color: var(--green-dim);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .member-list { margin-bottom: 12px; }
    .member-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      border-bottom: 1px solid #111;
      font-size: 21px;
      color: var(--green);
      letter-spacing: 1px;
    }
    .member-row::before { content: '░ '; color: var(--green-dim); }
    .member-row-name { flex: 1; }
    .remove-btn {
      background: none;
      border: 1px solid var(--red-dark);
      color: var(--red-dark);
      font-family: var(--font);
      font-size: 21px;
      cursor: pointer;
      padding: 3px 6px;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .remove-btn:hover { background: var(--red-dark); color: var(--red); }

    .add-row { display: flex; gap: 8px; }

    /* ── Keyframes ── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes flicker {
      0%,  95%, 100% { opacity: 1; }
      96%            { opacity: 0.4; }
      97%            { opacity: 1; }
      98%            { opacity: 0.6; }
      99%            { opacity: 1; }
    }
    @keyframes pop-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes march {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .marching { animation: march 0.8s steps(2) infinite; }
  </style>
</head>
<body>

<!-- Pixel progress bar -->
<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<!-- Header -->
<header class="app-header">
  <div class="header-deco">👾 &nbsp; 👾 &nbsp; 👾</div>
  <div class="app-title">STANDUP</div>
  <div class="app-sub">ARCADE &nbsp; V1.0</div>
  <div class="hiscore">HI-SCORE &nbsp; <span id="hiscore-val">00000</span></div>
</header>

<div class="card-stack">

  <!-- ── Mission Control panel ── -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">MISSION CONTROL</span>
    </div>
    <div class="panel-body">
      <div class="input-row">
        <input id="meeting-input" class="px-input"
               placeholder="meet.google.com/abc-def-ghi"
               onkeydown="if(event.key==='Enter') loadAttendees()" />
        <button class="btn btn-grey" id="load-btn" onclick="loadAttendees()">SCAN</button>
      </div>
      <div class="status-line" id="status">ENTER MEETING URL OR ADD PLAYERS IN OPTIONS</div>
      <div class="action-row">
        <button class="btn btn-green"  id="start-btn" onclick="startStandup()" disabled>PRESS&nbsp;START</button>
        <button class="btn btn-yellow" id="next-btn"  onclick="nextSpeaker()"  style="display:none">NEXT&nbsp;►</button>
        <button class="btn btn-red"    id="end-btn"   onclick="endStandup()"   style="display:none">QUIT</button>
      </div>
    </div>
  </div>

  <!-- ── Players panel ── -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">PLAYERS</span>
      <span class="panel-badge" id="team-badge"></span>
    </div>
    <div class="panel-body">
      <div id="team-content">
        <div class="empty-state">
          <div class="blink">-- NO PLAYERS FOUND --</div>
          <span class="empty-sub">INSERT COIN TO CONTINUE</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Options panel ── -->
  <div class="panel">
    <div class="options-toggle" onclick="toggleSettings()">
      <span class="options-toggle-title">OPTIONS</span>
      <span class="chevron" id="chevron">▼</span>
    </div>
    <div class="options-divider"></div>
    <div class="options-body" id="settings-body">
      <div class="opt-label">ADD PLAYERS</div>
      <div class="member-list" id="member-list"></div>
      <div class="add-row">
        <input id="add-input" class="px-input"
               placeholder="PLAYER NAME..."
               onkeydown="if(event.key==='Enter') addMember()" />
        <button class="btn btn-green" onclick="addMember()">+&nbsp;ADD</button>
      </div>
    </div>
  </div>

</div><!-- card-stack -->

<script>
  /* ── State ── */
  let team      = [];
  let remaining = [];
  let done      = [];
  let current   = null;
  let sessionCount = 0;

  const $ = id => document.getElementById(id);

  /* ── Persistence ── */
  function persist()  { /* team is session-only; no localStorage */ }
  function restore() {
    // team always starts empty — populated by SCAN or manual add
    sessionCount = parseInt(localStorage.getItem('standup-sessions') || '0', 10);
    updateHiScore();
    renderMemberList();
    renderIdleTeam();
    updateStartBtn();
  }

  function updateHiScore() {
    $('hiscore-val').textContent = String(sessionCount * 1000).padStart(5, '0');
  }

  /* ── Meet API ── */
  async function loadAttendees() {
    const val = $('meeting-input').value.trim();
    if (!val) { setStatus('ENTER A MEETING URL FIRST', false); return; }

    const btn = $('load-btn');
    btn.disabled = true; btn.textContent = '...';
    setStatus('SCANNING...', false);

    try {
      const res  = await fetch('/api/attendees?meeting=' + encodeURIComponent(val));
      const data = await res.json();
      if (data.error) {
        setStatus('ERROR: ' + data.error.toUpperCase(), true);
      } else {
        // Replace roster entirely with fresh attendees from this URL
        team = (data.attendees || []);
        endSession();            // reset any active session
        renderMemberList();
        renderIdleTeam();
        updateStartBtn();
        setStatus(
          team.length
            ? `${team.length} PLAYER${team.length > 1 ? 'S' : ''} LOADED`
            : 'NO PLAYERS FOUND IN THIS MEETING',
          !team.length
        );
      }
    } catch(e) {
      setStatus('CONNECTION FAILED: ' + e.message.toUpperCase(), true);
    }

    btn.disabled = false; btn.textContent = 'SCAN';
  }

  /* ── Team management ── */
  function addMember() {
    const inp = $('add-input');
    const name = inp.value.trim();
    if (!name || team.includes(name)) { inp.value = ''; return; }
    team.push(name);
    inp.value = '';
    persist();
    renderMemberList();
    if (current === null) renderIdleTeam();
    updateStartBtn();
  }

  function removeMember(name) {
    team = team.filter(m => m !== name);
    persist();
    renderMemberList();
    if (current === null) renderIdleTeam();
    updateStartBtn();
  }

  function renderMemberList() {
    const list = $('member-list');
    list.innerHTML = '';
    team.forEach(name => {
      const row = document.createElement('div');
      row.className = 'member-row';
      row.innerHTML =
        `<span class="member-row-name">${esc(name)}</span>` +
        `<button class="remove-btn" onclick="removeMember(${JSON.stringify(name)})">DEL</button>`;
      list.appendChild(row);
    });
  }

  /* ── Standup session ── */
  function startStandup() {
    if (!team.length) return;
    done      = [];
    remaining = [...team];
    current   = pickRandom();
    showSessionButtons(true);
    renderSession();
    setProgressBar();
    setStatus(`GAME START — ${team.length} PLAYER${team.length > 1 ? 'S' : ''}`, false);
  }

  function nextSpeaker() {
    done.push(current);
    if (!remaining.length) { finishStandup(); return; }
    current = pickRandom();
    renderSession();
    setProgressBar();
    const left = remaining.length;
    setStatus(left ? `${left} PLAYER${left > 1 ? 'S' : ''} REMAINING` : 'LAST PLAYER!', false);
    $('next-btn').textContent = remaining.length === 0 ? 'FINISH' : 'NEXT ►';
  }

  function pickRandom() {
    const i = Math.floor(Math.random() * remaining.length);
    return remaining.splice(i, 1)[0];
  }

  function finishStandup() {
    done.push(current);
    const all = done.slice();
    sessionCount++;
    localStorage.setItem('standup-sessions', sessionCount);
    updateHiScore();
    endSession();
    renderFinished(all);
    setStatus('STAGE CLEAR! ALL PLAYERS SPOKE.', false);
  }

  function endStandup() {
    endSession();
    renderIdleTeam();
    setStatus('GAME OVER.', false);
  }

  function endSession() {
    remaining = []; done = []; current = null;
    showSessionButtons(false);
    hideProgressBar();
  }

  /* ── Rendering ── */
  function renderIdleTeam() {
    const content = $('team-content');
    const badge   = $('team-badge');

    if (!team.length) {
      badge.textContent = '';
      content.innerHTML =
        '<div class="empty-state">' +
          '<div class="blink">-- NO PLAYERS FOUND --</div>' +
          '<span class="empty-sub">INSERT COIN TO CONTINUE</span>' +
        '</div>';
      return;
    }

    badge.textContent = team.length + 'P';

    const preview = shuffle([...team]);
    content.innerHTML = '';
    preview.forEach((name, i) => {
      const row = document.createElement('div');
      row.className = 'preview-row';
      row.style.animationDelay = (i * 30) + 'ms';
      row.innerHTML =
        `${esc(name)}<span class="preview-rank">#${i + 1}</span>`;
      content.appendChild(row);
    });
  }

  function renderSession() {
    const content = $('team-content');
    const badge   = $('team-badge');
    badge.textContent = `${done.length + 1}/${team.length}`;
    content.innerHTML = '';

    // Current speaker
    const block = document.createElement('div');
    block.className = 'speaker-block';
    block.innerHTML =
      `<div class="speaker-eyebrow">▶ NOW SPEAKING</div>` +
      `<div class="speaker-row">` +
        `<div class="speaker-sprite marching">${initials(current)}</div>` +
        `<div class="speaker-name">${esc(current)}</div>` +
      `</div>`;
    content.appendChild(block);

    // Remaining queue
    if (remaining.length) {
      const sec = document.createElement('div');
      sec.className = 'q-section';
      sec.innerHTML = `<div class="q-label">QUEUE</div>`;
      remaining.forEach(name => {
        const row = document.createElement('div');
        row.className = 'q-row';
        row.textContent = esc(name);
        sec.appendChild(row);
      });
      content.appendChild(sec);
    }

    // Done list
    if (done.length) {
      const sec = document.createElement('div');
      sec.className = 'q-section';
      sec.innerHTML = `<div class="q-label">CLEARED</div>`;
      done.forEach(name => {
        const row = document.createElement('div');
        row.className = 'q-row cleared';
        row.textContent = esc(name);
        sec.appendChild(row);
      });
      content.appendChild(sec);
    }
  }

  function renderFinished(all) {
    const content = $('team-content');
    const badge   = $('team-badge');
    badge.textContent = `${all.length}P`;
    content.innerHTML = '';

    const block = document.createElement('div');
    block.className = 'finish-block';
    block.innerHTML =
      `<div class="finish-stars blink">★ ★ ★</div>` +
      `<div class="finish-title">STAGE CLEAR!</div>` +
      `<div class="finish-sub">${all.length} PLAYER${all.length > 1 ? 'S' : ''} SPOKE &nbsp;·&nbsp; +${all.length * 100} PTS</div>`;
    content.appendChild(block);

    const sec = document.createElement('div');
    sec.className = 'q-section';
    sec.innerHTML = '<div class="q-label">ROLL CALL</div>';
    all.forEach(name => {
      const row = document.createElement('div');
      row.className = 'q-row cleared';
      row.textContent = esc(name);
      sec.appendChild(row);
    });
    content.appendChild(sec);
  }

  /* ── Progress bar ── */
  function setProgressBar() {
    $('progress-bar-wrap').classList.add('visible');
    $('progress-bar').style.width = ((done.length + 1) / team.length * 100) + '%';
  }
  function hideProgressBar() {
    $('progress-bar-wrap').classList.remove('visible');
    $('progress-bar').style.width = '0%';
  }

  /* ── UI helpers ── */
  function showSessionButtons(active) {
    $('start-btn').style.display = active ? 'none' : '';
    $('next-btn').style.display  = active ? '' : 'none';
    $('end-btn').style.display   = active ? '' : 'none';
    $('next-btn').textContent = 'NEXT ►';
  }

  function updateStartBtn() {
    $('start-btn').disabled = team.length === 0;
  }

  function setStatus(msg, isError) {
    const el = $('status');
    el.textContent = msg.toUpperCase();
    el.className = 'status-line' + (isError ? ' error' : '');
  }

  function toggleSettings() {
    $('settings-body').classList.toggle('open');
    $('chevron').classList.toggle('open');
  }

  /* ── Utilities ── */
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initials(name) {
    return name.split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || '?';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Boot ── */
  restore();
</script>
</body>
</html>
